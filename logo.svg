<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <!-- Background circle -->
  <circle cx="20" cy="20" r="19" fill="#111117" stroke="#2dd4bf" stroke-width="1.5"/>
  <!-- Stylized "newspaper/brief" icon — stacked lines with accent dot -->
  <rect x="11" y="11" width="18" height="3" rx="1.5" fill="#2dd4bf"/>
  <rect x="11" y="17" width="13" height="2" rx="1" fill="#5e5e6e"/>
  <rect x="11" y="22" width="16" height="2" rx="1" fill="#5e5e6e"/>
  <rect x="11" y="27" width="10" height="2" rx="1" fill="#5e5e6e"/>
  <!-- Accent pulse dot — represents "live/today" -->
  <circle cx="28" cy="28" r="3.5" fill="#2dd4bf" opacity="0.85"/>
  <circle cx="28" cy="28" r="2" fill="#111117"/>
  <circle cx="28" cy="28" r="1" fill="#2dd4bf"/>
</svg>
